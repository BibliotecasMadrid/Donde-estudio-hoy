// ─────────────────────────────────────────────
//  MAPA
// ─────────────────────────────────────────────

const map = L.map('map', {
  center: [40.4168, -3.7038],
  zoom: 12,
  zoomControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · Datos: <a href="https://datos.madrid.es">datos.madrid.es</a> (CC BY 4.0)',
  maxZoom: 19
}).addTo(map);

const colores = {
  biblioteca:  { fill: '#3B82F6', label: 'Biblioteca pública' },
  sala:        { fill: '#10B981', label: 'Sala de estudio'    },
  universidad: { fill: '#8B5CF6', label: 'Universidad / BNE'  }
};

function makeIcon(tipo) {
  const c = colores[tipo].fill;
  return L.divIcon({
    className: '',
    html: `<svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="8" fill="${c}" fill-opacity="0.9" stroke="white" stroke-width="2.5"/>
    </svg>`,
    iconSize: [22, 22],
    iconAnchor: [11, 11],
    popupAnchor: [0, -14]
  });
}

function buildPopup(d) {
  const c = colores[d.tipo];
  const horarioHtml = d.horario
    .split('\n')
    .map(l => `<div>${l}</div>`)
    .join('');

  return `
    <div class="popup-inner">
      <span class="popup-badge" style="background:${c.fill}">${c.label}</span>
      <div class="popup-name">${d.nombre}</div>
      <div class="popup-address">${d.distrito} · ${d.direccion}</div>
      <div class="popup-schedule">
        <div class="schedule-label">Horario</div>
        ${horarioHtml}
      </div>
    </div>`;
}

lugares.forEach(d => {
  L.marker([d.lat, d.lng], { icon: makeIcon(d.tipo) })
    .bindPopup(buildPopup(d), { maxWidth: 320 })
    .addTo(map);
});
