const map = L.map('map', {
  center: [40.4168, -3.7038],
  zoom: 12,
  zoomControl: true
});

// Base limpia y moderna (CARTO Positron) con respaldo retina
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · © <a href="https://carto.com/attributions">CARTO</a> · Datos: <a href="https://datos.madrid.es">datos.madrid.es</a> (CC BY 4.0)',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

const colores = {
  biblioteca:  { fill: '#2563EB', label: 'Biblioteca pública' },
  sala:        { fill: '#059669', label: 'Sala de estudio'    },
  universidad: { fill: '#7C3AED', label: 'Universidad / BNE'  }
};

function makeIcon(tipo) {
  const c = colores[tipo].fill;
  return L.divIcon({
    className: 'study-marker',
    html: `<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="9" fill="#fff"/>
      <circle cx="12" cy="12" r="7" fill="${c}"/>
      <circle cx="12" cy="12" r="2.6" fill="#fff" fill-opacity="0.92"/>
    </svg>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
    popupAnchor: [0, -13]
  });
}

// Enlace a la web del centro: usa la URL oficial si existe;
// si no, una búsqueda que siempre resuelve a su web/horario.
function webUrl(d) {
  if (d.web) return d.web;
  return 'https://www.google.com/search?q=' + encodeURIComponent(d.nombre + ' Madrid');
}

// ─────────────────────────────────────────────
//  SLUGS — deben ser IDÉNTICOS a build.py para que
//  las URLs del panel coincidan con las páginas generadas.
// ─────────────────────────────────────────────
const BASE_URL = 'https://bibliotecasmadrid.github.io/Donde-estudio-hoy/';
const PREFIJOS = ["biblioteca pública ", "biblioteca municipal ", "salas de estudio ",
  "sala de estudio del ", "sala de estudio de la ", "sala de estudio ", "sala de lectura ", "biblioteca "];

function slugify(nombre) {
  let base = nombre;
  const low = nombre.toLowerCase();
  for (const p of PREFIJOS) { if (low.startsWith(p)) { base = nombre.slice(p.length); break; } }
  base = base.normalize('NFKD').replace(/[̀-ͯ]/g, '').toLowerCase();
  base = base.replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  return base || 'centro';
}

const slugOf = new Map(), placeOf = new Map();
(function buildSlugs() {
  const seen = {};
  lugares.forEach(d => {
    let s = slugify(d.nombre);
    if (seen[s]) { seen[s]++; s = s + '-' + seen[s]; } else { seen[s] = 1; }
    slugOf.set(d, s); placeOf.set(s, d);
  });
})();

// ─────────────────────────────────────────────
//  PANEL LATERAL
// ─────────────────────────────────────────────
const panel = document.getElementById('panel');
const panelBody = document.getElementById('panel-body');

function panelHtml(d) {
  const c = colores[d.tipo];
  const horarioHtml = d.horario.split('\n').map(l => `<div>${l}</div>`).join('');
  const label = d.web ? 'Web oficial' : 'Buscar web y horario';
  return `
    <span class="panel-badge" style="background:${c.fill}">${c.label}</span>
    <h2 class="panel-name">${d.nombre}</h2>
    <p class="panel-address">${d.distrito} · ${d.direccion}</p>
    <div class="panel-schedule"><div class="panel-label">Horario</div>${horarioHtml}</div>
    <div class="panel-actions">
      <a class="panel-link" style="background:${c.fill}" href="${webUrl(d)}" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        ${label}
      </a>
      <a class="panel-page" href="${slugOf.get(d)}">Página de este centro ↗</a>
    </div>`;
}

let current = null;
function openPlace(d, push) {
  current = d;
  panelBody.innerHTML = panelHtml(d);
  panel.classList.add('open');
  panel.setAttribute('aria-hidden', 'false');
  if (push) history.pushState({ slug: slugOf.get(d) }, '', slugOf.get(d));
  map.panTo([d.lat, d.lng], { animate: true });
}
function closePanel(push) {
  current = null;
  panel.classList.remove('open');
  panel.setAttribute('aria-hidden', 'true');
  if (push) history.pushState({}, '', './');
}

document.getElementById('panel-close').addEventListener('click', () => closePanel(true));
document.addEventListener('keydown', e => { if (e.key === 'Escape' && current) closePanel(true); });
map.on('click', () => { if (current) closePanel(true); });

// ─────────────────────────────────────────────
//  MARCADORES
// ─────────────────────────────────────────────
lugares.forEach(d => {
  L.marker([d.lat, d.lng], { icon: makeIcon(d.tipo), title: d.nombre })
    .addTo(map)
    .on('click', () => openPlace(d, true));
});

// Sincronizar con la URL: back/forward del navegador y enlaces #slug
function placeFromUrl() {
  let slug = location.hash.slice(1);
  if (!slug) {
    const path = location.pathname.replace(/\/+$/, '');
    slug = path.substring(path.lastIndexOf('/') + 1);
  }
  return placeOf.get(decodeURIComponent(slug)) || null;
}
window.addEventListener('popstate', () => {
  const d = placeFromUrl();
  if (d) openPlace(d, false); else closePanel(false);
});
(function initFromUrl() {
  const d = placeFromUrl();
  if (d) { openPlace(d, false); history.replaceState({ slug: slugOf.get(d) }, '', slugOf.get(d)); }
})();

// ─────────────────────────────────────────────
//  SEO: datos estructurados (ItemList) generados
//  desde el propio array, sin duplicar datos.
// ─────────────────────────────────────────────
(function injectStructuredData() {
  const itemList = {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "Bibliotecas y salas de estudio en Madrid",
    "numberOfItems": lugares.length,
    "itemListElement": lugares.map((d, i) => ({
      "@type": "ListItem",
      "position": i + 1,
      "item": {
        "@type": "Library",
        "name": d.nombre,
        "description": "Horario: " + d.horario.replace(/\n/g, ' '),
        "address": {
          "@type": "PostalAddress",
          "streetAddress": d.direccion,
          "addressLocality": "Madrid",
          "addressRegion": "Comunidad de Madrid",
          "addressCountry": "ES"
        },
        "geo": { "@type": "GeoCoordinates", "latitude": d.lat, "longitude": d.lng },
        "url": BASE_URL + slugOf.get(d)
      }
    }))
  };
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(itemList);
  document.head.appendChild(s);
})();
</script>
